spring:
  application:
    name: broadcast-service

  profiles:
    active: mock

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: broadcast-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100

      properties:
        max.poll.interval.ms: 600000
        session.timeout.ms: 45000
        heartbeat.interval.ms: 15000
        fetch.max.wait.ms: 500
        fetch.min.bytes: 1
        fetch.max.bytes: 52428800

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    listener:
      concurrency: 6
      type: single
      ack-mode: manual_immediate

  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false

  lifecycle:
    timeout-per-shutdown-phase: 60s

# ── Kafka Topics — must match exactly what WhatsappMessage service publishes to ──
kafka:
  topics:
    outbound-messages: whatsapp.broadcast.dispatch   # plain string — matches @KafkaListener SpEL

meta:
  api:
    base-url: https://graph.facebook.com/v23.0
    connect-timeout: 5000
    read-timeout: 30000

messaging:
  service:
    base-url: ${MESSAGING_SERVICE_URL:http://localhost:8080}
    connect-timeout: 5000
    read-timeout: 30000
    paths:
      message-results-callback: /internal/broadcast/callbacks/message-results

campaign:
  max-concurrent-users: 100
  semaphore-cleanup-enabled: true
  executor:
    core-pool-size: 500
    max-pool-size: 2000
    queue-capacity: 10000

server:
  port: 8090
  shutdown: graceful

logging:
  level:
    root: INFO
    com.aigreentick.services.broadcast: DEBUG          # ← DEBUG so you see partition assignment
    com.aigreentick.services.broadcast.service.BatchCoordinatorService: DEBUG
    com.aigreentick.services.broadcast.kafka.consumer: DEBUG
    com.aigreentick.services.broadcast.client.service: INFO

    org.apache.kafka: WARN
    org.apache.kafka.clients.consumer.ConsumerConfig: WARN
    org.apache.kafka.clients.producer.ProducerConfig: WARN
    org.apache.kafka.clients.consumer.internals: WARN

    org.springframework.kafka: INFO                    # ← INFO so partition assignment log shows
    org.springframework.kafka.listener: INFO

    reactor.netty.http.client: WARN
    org.springframework.web.reactive: WARN
    io.netty: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"